<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeStackGen - AI Website Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen font-sans text-white">
    
    <header class="fixed top-0 w-full bg-black/90 backdrop-blur-xl z-50 border-b border-white/10">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-12 h-12 bg-gradient-to-r from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center shadow-2xl">
                    <i class="fas fa-rocket text-2xl text-white"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold bg-gradient-to-r from-white to-gray-200 bg-clip-text text-transparent">FreeStackGen</h1>
                    <p class="text-xs text-gray-400">AI Website Builder</p>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <span class="text-sm bg-white/10 px-3 py-1 rounded-full">v1.0 Live</span>
                <button onclick="exportZip()" class="bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white px-6 py-2.5 rounded-xl font-semibold shadow-xl hover:shadow-2xl transform hover:-translate-y-1 transition-all duration-300 flex items-center">
                    <i class="fas fa-file-zipper mr-2"></i>Download ZIP
                </button>
            </div>
        </div>
    </header>

    <main class="pt-24 pb-12">
        <!-- Hero Generator -->
        <section class="max-w-4xl mx-auto px-6 text-center mb-20">
            <div class="mb-12">
                <h1 class="text-5xl md:text-7xl lg:text-8xl font-black bg-gradient-to-r from-white via-blue-200 to-purple-200 bg-clip-text text-transparent mb-6 leading-tight">
                    Build Complete<br><span class="text-6xl md:text-7xl lg:text-8xl">Production Websites</span>
                </h1>
                <p class="text-xl md:text-2xl text-gray-300 max-w-2xl mx-auto leading-relaxed mb-12">
                    Enter name & description → Get full HTML/CSS/JS with auth, payments, features. 
                    Deploy anywhere instantly. Owner gets FREE unlimited access.
                </p>
            </div>

            <div class="bg-white/5 backdrop-blur-2xl border border-white/10 rounded-3xl p-8 md:p-12 shadow-2xl">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                    <input id="siteName" type="text" placeholder="Website Name (animation.auto)" 
                           class="w-full px-6 py-5 bg-white/5 border border-white/20 rounded-2xl text-white placeholder-gray-400 focus:outline-none focus:border-blue-400 focus:ring-4 focus:ring-blue-500/20 text-lg font-medium transition-all duration-300 hover:border-white/30">
                    <input id="siteDesc" type="text" placeholder="Description (AI Anime Generator)" 
                           class="w-full px-6 py-5 bg-white/5 border border-white/20 rounded-2xl text-white placeholder-gray-400 focus:outline-none focus:border-purple-400 focus:ring-4 focus:ring-purple-500/20 text-lg font-medium transition-all duration-300 hover:border-white/30">
                    <input id="siteColor" type="color" value="#ff6b6b" class="w-full h-16 rounded-2xl border-4 border-white/20 shadow-xl cursor-pointer hover:shadow-2xl transition-all duration-300">
                </div>
                <button onclick="generateWebsite()" class="w-full bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500 hover:from-blue-600 hover:via-purple-600 hover:to-pink-600 text-white px-8 py-8 rounded-3xl font-black text-2xl shadow-2xl hover:shadow-3xl transform hover:-translate-y-3 transition-all duration-500 group">
                    <i class="fas fa-sparkles text-3xl mr-4 group-hover:animate-pulse"></i>
                    <span class="inline-block">GENERATE FULL WEBSITE</span>
                </button>
            </div>
        </section>

        <!-- Preview & Files -->
        <section id="outputSection" class="max-w-6xl mx-auto px-6 hidden">
            <div class="bg-white/3 backdrop-blur-xl rounded-3xl border border-white/10 p-8 mb-8 shadow-2xl">
                <div class="flex flex-col lg:flex-row gap-8 items-start lg:items-center justify-between mb-8 pb-8 border-b border-white/10">
                    <div>
                        <h2 class="text-4xl font-black bg-gradient-to-r from-white to-gray-200 bg-clip-text text-transparent mb-2 flex items-center">
                            <i class="fas fa-globe mr-4 text-blue-400"></i>
                            <span id="generatedTitle"></span>
                        </h2>
                        <p class="text-xl text-gray-300" id="generatedDesc"></p>
                    </div>
                    <div class="flex flex-wrap gap-3">
                        <button onclick="previewLive()" class="px-6 py-3 bg-blue-500/20 hover:bg-blue-500/40 border-2 border-blue-500/30 text-blue-200 backdrop-blur-sm rounded-2xl font-semibold transition-all duration-300 hover:scale-105 flex items-center">
                            <i class="fas fa-play-circle mr-2"></i>Live Preview
                        </button>
                        <button onclick="copyAllFiles()" class="px-6 py-3 bg-green-500/20 hover:bg-green-500/40 border-2 border-green-500/30 text-green-200 backdrop-blur-sm rounded-2xl font-semibold transition-all duration-300 hover:scale-105 flex items-center">
                            <i class="fas fa-copy mr-2"></i>Copy All Code
                        </button>
                        <button onclick="exportZip()" class="px-6 py-3 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-semibold rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-300 flex items-center transform hover:-translate-y-1">
                            <i class="fas fa-file-zipper mr-2"></i>Download ZIP
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
                    <!-- Live Preview -->
                    <div class="xl:col-span-2">
                        <div class="bg-black/90 rounded-3xl overflow-hidden shadow-2xl border border-white/20">
                            <div class="bg-gradient-to-r from-gray-800 to-gray-900 px-6 py-4 border-b border-white/10 flex items-center justify-between">
                                <span class="flex items-center text-sm font-medium">
                                    <i class="fas fa-desktop mr-2 text-blue-400"></i>Live Preview
                                </span>
                                <div class="flex items-center space-x-2 text-xs">
                                    <span class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></span>
                                    <span>Responsive</span>
                                </div>
                            </div>
                            <iframe id="livePreview" class="w-full h-[70vh] min-h-[500px] border-0 bg-white"></iframe>
                        </div>
                    </div>

                    <!-- File Manager -->
                    <div class="space-y-6">
                        <!-- Files List -->
                        <div class="bg-white/5 backdrop-blur-xl rounded-2xl p-6 border border-white/10">
                            <h4 class="font-bold text-xl mb-6 flex items-center text-yellow-300">
                                <i class="fas fa-folder-open mr-3"></i>Generated Files (6)
                            </h4>
                            <div id="fileList" class="space-y-3 max-h-96 overflow-y-auto custom-scrollbar"></div>
                        </div>

                        <!-- Deploy Buttons -->
                        <div class="bg-gradient-to-br from-emerald-500/10 to-teal-500/10 backdrop-blur-xl rounded-2xl p-6 border border-emerald-400/20">
                            <h4 class="font-bold text-xl mb-6 flex items-center text-emerald-300">
                                <i class="fas fa-rocket mr-3"></i>🚀 Deploy Live (30s)
                            </h4>
                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="deployNetlify()" class="group p-4 bg-white/10 hover:bg-white/20 border border-white/20 rounded-xl transition-all duration-300 hover:scale-105 hover:shadow-xl flex flex-col items-center text-sm">
                                    <i class="fas fa-cloud text-emerald-400 text-2xl mb-2 group-hover:animate-bounce"></i>
                                    <div>Netlify</div>
                                    <div class="text-xs text-emerald-300 mt-1">Free Forever</div>
                                </button>
                                <button onclick="deployVercel()" class="group p-4 bg-white/10 hover:bg-white/20 border border-white/20 rounded-xl transition-all duration-300 hover:scale-105 hover:shadow-xl flex flex-col items-center text-sm">
                                    <i class="fas fa-bolt text-sky-400 text-2xl mb-2 group-hover:animate-bounce"></i>
                                    <div>Vercel</div>
                                    <div class="text-xs text-sky-300 mt-1">Free Tier</div>
                                </button>
                                <button onclick="deployGitHub()" class="group p-4 bg-white/10 hover:bg-white/20 border border-white/20 rounded-xl transition-all duration-300 hover:scale-105 hover:shadow-xl flex flex-col items-center text-sm">
                                    <i class="fab fa-github text-gray-300 text-2xl mb-2 group-hover:animate-bounce"></i>
                                    <div>GitHub Pages</div>
                                    <div class="text-xs text-gray-300 mt-1">Free</div>
                                </button>
                                <button onclick="deployFirebase()" class="group p-4 bg-white/10 hover:bg-white/20 border border-white/20 rounded-xl transition-all duration-300 hover:scale-105 hover:shadow-xl flex flex-col items-center text-sm">
                                    <i class="fas fa-fire text-orange-400 text-2xl mb-2 group-hover:animate-bounce"></i>
                                    <div>Firebase</div>
                                    <div class="text-xs text-orange-300 mt-1">Free Spark</div>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
    </style>

    <script src="generator.js"></script>
</body>
</html>
